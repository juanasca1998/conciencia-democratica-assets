<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" preserveAspectRatio="xMidYMid meet">
  <!-- Fondo crema sólido editorial -->
  <rect width="1200" height="700" fill="#d9d6cf"/>
  <!-- Marco interior -->
  <rect x="40" y="40" width="1120" height="620" fill="none" stroke="#7a1f1f" stroke-width="3"/>
  <rect x="56" y="56" width="1088" height="588" fill="none" stroke="#c9a96e" stroke-width="1"/>

  <!-- Rosa blanca estilizada (símbolo de la revista) -->
  <g transform="translate(600 230)" opacity="0.85">
    <!-- pétalos exteriores -->
    <path d="M0 -70 C 28 -70 50 -52 50 -22 C 50 8 28 26 0 26 C -28 26 -50 8 -50 -22 C -50 -52 -28 -70 0 -70 Z" fill="#ffffff" stroke="#171717" stroke-width="2"/>
    <!-- pétalos internos -->
    <path d="M0 -45 C 15 -45 28 -32 28 -15 C 28 2 15 14 0 14 C -15 14 -28 2 -28 -15 C -28 -32 -15 -45 0 -45 Z" fill="#ffffff" stroke="#171717" stroke-width="1.5"/>
    <!-- centro -->
    <circle cx="0" cy="-5" r="6" fill="#7a1f1f"/>
    <!-- tallo -->
    <path d="M0 26 L0 78" stroke="#171717" stroke-width="2.5" stroke-linecap="round"/>
    <!-- hojas -->
    <path d="M0 40 C -22 38 -32 50 -28 62 C -16 60 -4 52 0 46 Z" fill="#171717" opacity="0.7"/>
    <path d="M0 55 C 22 53 32 65 28 77 C 16 75 4 67 0 61 Z" fill="#171717" opacity="0.7"/>
  </g>

  <!-- Texto principal -->
  <text x="600" y="430" font-family="Georgia, 'Times New Roman', serif" font-size="42" letter-spacing="8" text-anchor="middle" fill="#171717" font-weight="700">IMAGEN NO DISPONIBLE</text>

  <!-- Línea decorativa -->
  <line x1="500" y1="465" x2="700" y2="465" stroke="#c9a96e" stroke-width="2"/>

  <!-- Subtítulo institucional -->
  <text x="600" y="510" font-family="Georgia, serif" font-size="22" text-anchor="middle" fill="#7a1f1f" font-style="italic">Revista Conciencia Democrática</text>

  <!-- Nota breve -->
  <text x="600" y="570" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" letter-spacing="2" text-anchor="middle" fill="#171717" opacity="0.55">EL CONTENIDO VISUAL SE RESTABLECERÁ PRONTO</text>
</svg>
